name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-venv python3-gi gir1.2-gtk-4.0 gir1.2-adw-1

      - name: Create virtual environment
        run: |
          python3 -m venv --system-site-packages .venv

      - name: Install project
        run: |
          . .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint
        run: |
          . .venv/bin/activate
          ruff check .

      - name: Test
        run: |
          . .venv/bin/activate
          pytest
