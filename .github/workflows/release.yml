name: Release AppImage

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  appimage:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Read project version
        id: project
        run: |
          version="$(sed -n 's/^version = "\(.*\)"/\1/p' pyproject.toml | head -n 1)"
          if [ -z "$version" ]; then
            echo "Could not determine project version from pyproject.toml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Ensure tag matches project version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          expected="v${{ steps.project.outputs.version }}"
          if [ "$GITHUB_REF_NAME" != "$expected" ]; then
            echo "Tag $GITHUB_REF_NAME does not match project version $expected" >&2
            exit 1
          fi

      - name: Install AppImage build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y desktop-file-utils dpkg-dev file gtk-update-icon-cache libfuse2t64 libgdk-pixbuf2.0-bin libglib2.0-bin librsvg2-common patchelf python3-pip python3-venv squashfs-tools zsync
          python3 -m venv "$RUNNER_TEMP/appimage-builder-venv"
          . "$RUNNER_TEMP/appimage-builder-venv/bin/activate"
          pip install --upgrade pip
          pip install 'packaging<22' 'appimage-builder==1.1.0'
          echo "$RUNNER_TEMP/appimage-builder-venv/bin" >> "$GITHUB_PATH"

      - name: Build AppImage
        run: ./scripts/build-appimage.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ steps.project.outputs.version }}
          path: dist/*

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          shopt -s nullglob
          assets=(dist/*.AppImage dist/*.zsync)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets were produced." >&2
            exit 1
          fi

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              --verify-tag
          fi
