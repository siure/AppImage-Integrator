version: 1

script:
  - rm -rf AppDir
  - mkdir -p AppDir/usr/bin
  - mkdir -p AppDir/usr/share/applications
  - mkdir -p AppDir/usr/share/icons/hicolor/512x512/apps
  - mkdir -p AppDir/usr/src
  - cp -a src/appimage_integrator AppDir/usr/src/
  - install -Dm755 packaging/appimage/usr/bin/appimage-integrator AppDir/usr/bin/appimage-integrator
  - install -Dm644 src/appimage_integrator/assets/desktop/io.github.appimageintegrator.desktop AppDir/usr/share/applications/io.github.appimageintegrator.desktop
  - install -Dm644 src/appimage_integrator/ui/assets/hicolor/512x512/apps/io.github.appimageintegrator.png AppDir/usr/share/icons/hicolor/512x512/apps/io.github.appimageintegrator.png

AppDir:
  path: ./AppDir
  app_info:
    id: io.github.appimageintegrator
    name: AppImage Integrator
    icon: io.github.appimageintegrator
    version: __APPIMAGE_VERSION__
    exec: usr/bin/appimage-integrator

  apt:
    arch:
      - amd64
    sources:
      - sourceline: "deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy main restricted universe multiverse"
      - sourceline: "deb [arch=amd64] http://archive.ubuntu.com/ubuntu/ jammy-updates main restricted universe multiverse"
    include:
      - adwaita-icon-theme
      - coreutils
      - desktop-file-utils
      - file
      - gir1.2-adw-1
      - gir1.2-gtk-4.0
      - libgdk-pixbuf2.0-bin
      - libglib2.0-bin
      - python3
      - python3-gi
      - shared-mime-info
      - squashfs-tools
    exclude:
      - humanity-icon-theme
      - ubuntu-mono

  after_bundle: |
    set -eux
    if [ -d "AppDir/usr/share/glib-2.0/schemas" ]; then
      AppDir/usr/bin/glib-compile-schemas "AppDir/usr/share/glib-2.0/schemas"
    fi
    loader_cache="$(find AppDir/usr/lib -path '*gdk-pixbuf-2.0/*/loaders.cache' | head -n 1 || true)"
    if [ -n "$loader_cache" ]; then
      loader_dir="$(dirname "$loader_cache")"
      AppDir/usr/bin/gdk-pixbuf-query-loaders "$loader_dir"/*.so > "$loader_cache"
    fi

AppImage:
  arch: x86_64
  update-information: None
